<script>
document.addEventListener("DOMContentLoaded", () => {
    const items = document.querySelectorAll(".nav-item");

    const startDelay = 50; // 👈 delay before animation starts

    setTimeout(() => {
        items.forEach((item, i) => {
            setTimeout(() => {
                item.classList.add("show");
            }, i * 200);
        });
    }, startDelay);
});
</script>
